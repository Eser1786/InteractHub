name: Deploy to SmarterASP.NET via FTP

on:
  push:
    branches:
      - main
      - dev
    paths-ignore:
      - '**/*.md'
      - '**/*.png'
      - '**/*.jpg'
      - '**/*.jpeg'

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout Code
      uses: actions/checkout@v3

    - name: Setup .NET 9
      uses: actions/setup-dotnet@v3
      with:
        dotnet-version: '9.0.x'
        
    - name: Restore dependencies
      run: dotnet restore backend/InteractHub.sln

    - name: Build and Publish
      run: dotnet publish backend/InteractHub.API/InteractHub.API.csproj -c Release -o ./publish /p:UseAppHost=false
      
    - name: Create app_offline.htm (Stop IIS)
      run: echo "<html><body><h1>Hệ thống đang được cập nhật (Deploying...), vui lòng quay lại sau ít phút.</h1></body></html>" > app_offline.htm

    - name: Upload app_offline.htm to lock IIS
      run: curl -T app_offline.htm ftp://${{ secrets.FTP_SERVER }}/site1/app_offline.htm --user ${{ secrets.FTP_USERNAME }}:${{ secrets.FTP_PASSWORD }}

    - name: Sleep for 5s to ensure App Pool is stopped
      run: sleep 5

    - name: Deploy via FTP
      uses: SamKirkland/FTP-Deploy-Action@v4.3.4
      with:
        server: ${{ secrets.FTP_SERVER }}
        username: ${{ secrets.FTP_USERNAME }}
        password: ${{ secrets.FTP_PASSWORD }}
        local-dir: ./publish/
        # Thư mục gốc trên SmarterASP thường được tạo là site1
        server-dir: /site1/

    - name: Remove app_offline.htm to start IIS
      run: curl -Q "DELE /site1/app_offline.htm" ftp://${{ secrets.FTP_SERVER }}/ --user ${{ secrets.FTP_USERNAME }}:${{ secrets.FTP_PASSWORD }} || true
